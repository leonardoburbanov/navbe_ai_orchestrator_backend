services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app/backend
      - backend_db:/app
    environment:
      - DATABASE_URL=sqlite:///orchestrator.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8003
    depends_on:
      - backend
    restart: always

volumes:
  backend_db:
